[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1

board_build.psram = enabled

lib_deps =
    me-no-dev/ESPAsyncWebServer

lib_ignore =
    WebServer

lib_ldf_mode = deep+